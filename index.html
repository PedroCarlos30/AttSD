<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudBox - Seu Armazenamento</title>
    <!-- Tailwind CSS para um design limpo e moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Ícones Lucide para os arquivos e botões -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">

    <!-- Navbar -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <i data-lucide="box" class="w-8 h-8 text-blue-600"></i>
                <span class="text-xl font-bold tracking-tight text-gray-900">CloudBox</span>
            </div>
            <div class="text-sm text-gray-500 flex items-center gap-2">
                <span class="inline-block w-2 h-2 rounded-full bg-green-500"></span> AWS Conectado
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-6xl w-full mx-auto px-4 py-8 grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <!-- Painel de Upload (Esquerda) -->
        <section class="md:col-span-1 bg-white p-6 rounded-xl border border-gray-200 shadow-sm h-fit">
            <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                <i data-lucide="upload-cloud" class="text-blue-600"></i> Enviar Arquivo
            </h2>
            
            <div id="dropzone" class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center cursor-pointer hover:border-blue-500 transition-colors bg-gray-50">
                <input type="file" id="fileInput" class="hidden" />
                <i data-lucide="file-plus" class="w-10 h-10 text-gray-400 mx-auto mb-2"></i>
                <p class="text-sm font-medium text-gray-700">Arraste um arquivo ou <span class="text-blue-600">clique aqui</span></p>
                <p class="text-xs text-gray-400 mt-1" id="selected-file-name">Nenhum arquivo selecionado</p>
            </div>

            <button id="uploadBtn" disabled class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg transition-colors disabled:bg-gray-300 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                <i data-lucide="upload" class="w-4 h-4"></i> Iniciar Upload
            </button>

            <!-- Barra de Progresso -->
            <div id="progressContainer" class="mt-4 hidden">
                <div class="w-full bg-gray-200 rounded-full h-2">
                    <div id="progressBar" class="bg-blue-600 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
                <p id="progressText" class="text-xs text-gray-500 mt-1 text-right">0%</p>
            </div>
        </section>

        <!-- Lista de Arquivos (Direita) -->
        <section class="md:col-span-2 bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-lg font-semibold flex items-center gap-2">
                    <i data-lucide="folder" class="text-blue-600"></i> Meus Arquivos
                </h2>
                <button id="refreshBtn" class="p-2 hover:bg-gray-100 rounded-full transition-colors text-gray-600" title="Atualizar lista">
                    <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                </button>
            </div>

            <!-- Estado de Carregamento / Lista -->
            <div id="loadingState" class="text-center py-12 hidden">
                <div class="animate-spin inline-block w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full mb-2"></div>
                <p class="text-gray-500 text-sm">Buscando arquivos no S3...</p>
            </div>

            <div id="emptyState" class="text-center py-12 text-gray-400">
                <i data-lucide="folder-open" class="w-12 h-12 mx-auto mb-2 text-gray-300"></i>
                <p class="text-sm">Nenhum arquivo encontrado ou API não configurada.</p>
            </div>

            <ul id="fileList" class="divide-y divide-gray-100 hidden">
                <!-- Os itens da lista serão injetados aqui via JS -->
            </ul>
        </section>
    </main>

    <script>
        // Substitua pela URL do seu estágio do API Gateway (configurado via Route53)
        const API_BASE_URL = 'https://m5zjkv8lsg.execute-api.us-east-1.amazonaws.com';

        // Elementos do DOM
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const selectedFileName = document.getElementById('selected-file-name');
        const uploadBtn = document.getElementById('uploadBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const fileList = document.getElementById('fileList');
        const refreshBtn = document.getElementById('refreshBtn');
        const loadingState = document.getElementById('loadingState');
        const emptyState = document.getElementById('emptyState');

        let fileToUpload = null;

        // Inicializar ícones do Lucide
        lucide.createIcons();

        // Eventos de seleção de arquivo
        dropzone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFileSelection(e.target.files[0]));

        // Drag and Drop
        dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('border-blue-500', 'bg-blue-50/50'); });
        dropzone.addEventListener('dragleave', () => { dropzone.classList.remove('border-blue-500', 'bg-blue-50/50'); });
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('border-blue-500', 'bg-blue-50/50');
            if (e.dataTransfer.files.length > 0) {
                handleFileSelection(e.dataTransfer.files[0]);
            }
        });

        function handleFileSelection(file) {
            if (!file) return;
            fileToUpload = file;
            selectedFileName.textContent = `${file.name} (${(file.size / (1024 * 1024)).toFixed(2)} MB)`;
            uploadBtn.disabled = false;
        }

        // Fluxo de Upload (Solicita URL assinada -> Upload direto pro S3)
        uploadBtn.addEventListener('click', async () => {
            if (!fileToUpload) return;

            try {
                uploadBtn.disabled = true;
                progressContainer.classList.remove('hidden');
                
                // 1. Solicitar URL assinada para a Lambda via API Gateway
               const response = await fetch(`${API_BASE_URL}/`, {
               method: 'POST',
               headers: { 'Content-Type': 'application/json' },
               body: JSON.stringify({ fileName: fileToUpload.name, fileType: fileToUpload.type })
             });
                
                if (!response.ok) throw new Error('Falha ao gerar URL de upload.');
                const { uploadUrl } = await response.json();

                // 2. Upload direto para o S3 usando XMLHttpRequest para acompanhar o progresso
                const xhr = new XMLHttpRequest();
                xhr.open('PUT', uploadUrl, true);
                xhr.setRequestHeader('Content-Type', fileToUpload.type);

                xhr.upload.onprogress = (e) => {
                    if (e.lengthComputable) {
                        const percentComplete = Math.round((e.loaded / e.total) * 100);
                        progressBar.style.width = `${percentComplete}%`;
                        progressText.textContent = `${percentComplete}%`;
                    }
                };

                xhr.onload = () => {
                    if (xhr.status === 200) {
                        alert('Arquivo enviado com sucesso!');
                        resetUploadPanel();
                        fetchFiles();
                    } else {
                        alert('Erro ao enviar arquivo para o S3.');
                    }
                };

                xhr.send(fileToUpload);

            } catch (error) {
                console.error(error);
                alert('Erro no processo de upload: ' + error.message);
                uploadBtn.disabled = false;
            }
        });

        function resetUploadPanel() {
            fileToUpload = null;
            fileInput.value = '';
            selectedFileName.textContent = 'Nenhum arquivo selecionado';
            uploadBtn.disabled = true;
            progressContainer.classList.add('hidden');
            progressBar.style.width = '0%';
            progressText.textContent = '0%';
        }

        // Listar arquivos salvos
        async function fetchFiles() {
            if (!fileToUpload) return; // Garante que temos um arquivo enviado para buscar
    
                loadingState.classList.remove('hidden');
                fileList.classList.add('hidden');
                emptyState.classList.add('hidden');

            try {
        // Envia o método GET para a raiz passsando o fileName por parâmetro
                const response = await fetch(`${API_BASE_URL}/?fileName=${encodeURIComponent(fileToUpload.name)}`);
                if (!response.ok) throw new Error('Erro ao buscar arquivo.');
        
                const data = await response.json(); // Recebe {'downloadUrl': '...'} da sua Lambda

                fileList.innerHTML = '';
                const li = document.createElement('li');
                li.className = 'py-3 flex items-center justify-between hover:bg-gray-50 px-2 rounded-lg transition-colors';
                li.innerHTML = `
                    <div class="flex items-center gap-3 min-w-0">
                    <i data-lucide="file" class="w-5 h-5 text-blue-500 flex-shrink-0"></i>
                    <div class="truncate">
                    <p class="text-sm font-medium text-gray-900 truncate">${fileToUpload.name}</p>
                    <p class="text-xs text-gray-500">Pronto para leitura (GET)</p>
                </div>
                </div>
                <a href="${data.downloadUrl}" target="_blank" class="p-2 hover:bg-blue-50 text-blue-600 rounded-lg transition-colors flex items-center gap-1 text-sm font-medium">
                <i data-lucide="download" class="w-4 h-4"></i> Abrir Arquivo (GET)
                </a>
        `       ;
        fileList.appendChild(li);

        lucide.createIcons();
        fileList.classList.remove('hidden');

        } catch (error) {
            console.error(error);
            emptyState.classList.remove('hidden');
        } finally {
            loadingState.classList.add('hidden');
        }
    }
    </script>
</body>
</html>
