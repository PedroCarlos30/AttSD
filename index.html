<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudBox - Seu Armazenamento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">

    <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <i data-lucide="box" class="w-8 h-8 text-blue-600"></i>
                <span class="text-xl font-bold tracking-tight text-gray-900">CloudBox</span>
            </div>
            <div class="text-sm text-gray-500 flex items-center gap-2">
                <span class="inline-block w-2 h-2 rounded-full bg-green-500"></span> AWS Conectado
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-6xl w-full mx-auto px-4 py-8 grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <section class="md:col-span-1 bg-white p-6 rounded-xl border border-gray-200 shadow-sm h-fit">
            <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                <i data-lucide="upload-cloud" class="text-blue-600"></i> Enviar Arquivo
            </h2>
            
            <div id="dropzone" class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center cursor-pointer hover:border-blue-500 transition-colors bg-gray-50">
                <input type="file" id="fileInput" class="hidden" />
                <i data-lucide="file-plus" class="w-10 h-10 text-gray-400 mx-auto mb-2"></i>
                <p class="text-sm font-medium text-gray-700">Arraste um arquivo ou <span class="text-blue-600">clique aqui</span></p>
                <p class="text-xs text-gray-400 mt-1" id="selected-file-name">Nenhum arquivo selecionado</p>
            </div>

            <button id="uploadBtn" disabled class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg transition-colors disabled:bg-gray-300 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                <i data-lucide="upload" class="w-4 h-4"></i> Iniciar Upload
            </button>

            <div id="progressContainer" class="mt-4 hidden">
                <div class="w-full bg-gray-200 rounded-full h-2">
                    <div id="progressBar" class="bg-blue-600 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
                <p id="progressText" class="text-xs text-gray-500 mt-1 text-right">0%</p>
            </div>
            <div id="statusMessage" class="mt-2 text-xs font-semibold text-center hidden"></div>
        </section>

        <section class="md:col-span-2 bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-lg font-semibold flex items-center gap-2">
                    <i data-lucide="folder" class="text-blue-600"></i> Recuperação de Arquivos (GET)
                </h2>
                <button id="refreshBtn" class="p-2 hover:bg-gray-100 rounded-full transition-colors text-gray-600" title="Atualizar lista">
                    <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                </button>
            </div>

            <div id="loadingState" class="text-center py-12 hidden">
                <div class="animate-spin inline-block w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full mb-2"></div>
                <p class="text-gray-500 text-sm">Buscando link de leitura no S3...</p>
            </div>

            <div id="emptyState" class="text-center py-12 text-gray-400">
                <i data-lucide="folder-open" class="w-12 h-12 mx-auto mb-2 text-gray-300"></i>
                <p class="text-sm">Envie um arquivo para gerar o link de leitura automático.</p>
            </div>

            <ul id="fileList" class="divide-y divide-gray-100 hidden">
                </ul>
        </section>
    </main>

    <footer class="bg-white border-t border-gray-200 py-4 text-center text-xs text-gray-500">
        Acessado via (DNS): <span id="dns-display" class="font-mono font-bold text-blue-600"></span>
    </footer>

    <script>
        // Configuração da URL do seu API Gateway HTTP tirada do print ioipa
        const API_BASE_URL = 'https://m5zjkv8lsg.execute-api.us-east-1.amazonaws.com'; 

        // Elementos do DOM
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const selectedFileName = document.getElementById('selected-file-name');
        const uploadBtn = document.getElementById('uploadBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const statusMessage = document.getElementById('statusMessage');
        const fileList = document.getElementById('fileList');
        const refreshBtn = document.getElementById('refreshBtn');
        const loadingState = document.getElementById('loadingState');
        const emptyState = document.getElementById('emptyState');
        const dnsDisplay = document.getElementById('dns-display');

        let fileToUpload = null;

        // Exibe o endereço atual no rodapé para validação do print
        dnsDisplay.textContent = window.location.href;

        // Inicializar ícones do Lucide
        lucide.createIcons();

        // Eventos de seleção de arquivo
        dropzone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFileSelection(e.target.files[0]));

        // Drag and Drop
        dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('border-blue-500', 'bg-blue-50/50'); });
        dropzone.addEventListener('dragleave', () => { dropzone.classList.remove('border-blue-500', 'bg-blue-50/50'); });
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('border-blue-500', 'bg-blue-50/50');
            if (e.dataTransfer.files.length > 0) {
                handleFileSelection(e.dataTransfer.files[0]);
            }
        });

        function handleFileSelection(file) {
            if (!file) return;
            fileToUpload = file;
            selectedFileName.textContent = `${file.name} (${(file.size / (1024 * 1024)).toFixed(2)} MB)`;
            uploadBtn.disabled = false;
            
            // Oculta mensagens de status anteriores
            statusMessage.classList.add('hidden');
        }

        // Fluxo de Upload (POST na raiz para obter URL assinada -> PUT direto pro S3)
        uploadBtn.addEventListener('click', async () => {
            if (!fileToUpload) return;

            try {
                uploadBtn.disabled = true;
                progressContainer.classList.remove('hidden');
                statusMessage.classList.remove('hidden', 'text-red-600', 'text-green-600');
                statusMessage.classList.add('text-gray-600');
                statusMessage.textContent = 'Solicitando URL assinada via POST...';
                
                // 1. Solicitar URL assinada para a Lambda na raiz da API (POST /)
                const response = await fetch(`${API_BASE_URL}/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fileName: fileToUpload.name, fileType: fileToUpload.type })
                });
                
                if (!response.ok) throw new Error('Falha ao gerar URL de upload.');
                const { uploadUrl } = await response.json();

                statusMessage.textContent = 'Enviando arquivo via PUT direto para o S3...';

                // 2. Upload direto para o S3 acompanhando o progresso
                const xhr = new XMLHttpRequest();
                xhr.open('PUT', uploadUrl, true);
                xhr.setRequestHeader('Content-Type', fileToUpload.type);

                xhr.upload.onprogress = (e) => {
                    if (e.lengthComputable) {
                        const percentComplete = Math.round((e.loaded / e.total) * 100);
                        progressBar.style.width = `${percentComplete}%`;
                        progressText.textContent = `${percentComplete}%`;
                    }
                };

                xhr.onload = () => {
                    if (xhr.status === 200) {
                        statusMessage.classList.remove('text-gray-600');
                        statusMessage.classList.add('text-green-600');
                        statusMessage.innerHTML = `✓ Operação PUT realizada!<br>Arquivo gravado com sucesso no S3.`;
                        
                        // Busca o link GET do arquivo enviado para preencher a lista
                        fetchFiles(fileToUpload.name, fileToUpload.size);
                    } else {
                        statusMessage.classList.remove('text-gray-600');
                        statusMessage.classList.add('text-red-600');
                        statusMessage.textContent = 'Erro ao enviar arquivo para o S3.';
                        uploadBtn.disabled = false;
                    }
                };

                xhr.send(fileToUpload);

            } catch (error) {
                console.error(error);
                statusMessage.classList.remove('text-gray-600');
                statusMessage.classList.add('text-red-600');
                statusMessage.textContent = 'Erro no processo: ' + error.message;
                uploadBtn.disabled = false;
            }
        });

        // Buscar link assinado de leitura (GET /)
        async function fetchFiles(fileName, fileSize) {
            if (!fileName) return;
            
            loadingState.classList.remove('hidden');
            fileList.classList.add('hidden');
            emptyState.classList.add('hidden');

            try {
                // Requisição GET na raiz da API passando o parâmetro na QueryString
                const response = await fetch(`${API_BASE_URL}/?fileName=${encodeURIComponent(fileName)}`);
                if (!response.ok) throw new Error('Erro ao buscar arquivo.');
                
                const data = await response.json(); // Retorna {'downloadUrl': '...'}

                fileList.innerHTML = '';
                const li = document.createElement('li');
                li.className = 'py-3 flex items-center justify-between hover:bg-gray-50 px-2 rounded-lg transition-colors';
                li.innerHTML = `
                    <div class="flex items-center gap-3 min-w-0">
                        <i data-lucide="file" class="w-5 h-5 text-blue-600 flex-shrink-0"></i>
                        <div class="truncate">
                            <p class="text-sm font-medium text-gray-900 truncate">${fileName}</p>
                            <p class="text-xs text-gray-500">${fileSize ? (fileSize / 1024).toFixed(1) : '---'} KB • Pronto para leitura</p>
                        </div>
                    </div>
                    <a href="${data.downloadUrl}" target="_blank" class="p-2 hover:bg-blue-50 text-blue-600 rounded-lg transition-colors flex items-center gap-1 text-sm font-medium border border-blue-200">
                        <i data-lucide="external-link" class="w-4 h-4"></i> Abrir via GET
                    </a>
                `;
                fileList.appendChild(li);

                lucide.createIcons();
                fileList.classList.remove('hidden');

            } catch (error) {
                console.error(error);
                emptyState.classList.remove('hidden');
            } finally {
                loadingState.classList.add('hidden');
            }
        }

        // Evento de recarga manual usando o arquivo que está na memória se houver
        refreshBtn.addEventListener('click', () => {
            if (fileToUpload) {
                fetchFiles(fileToUpload.name, fileToUpload.size);
            } else {
                alert('Nenhum arquivo enviado nesta sessão para atualizar.');
            }
        });
    </script>
</body>
</html>
